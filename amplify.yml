version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd packages/frontend
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: packages/frontend/.next
    files:
      - '**/*'
  cache:
    paths:
      - packages/frontend/node_modules/**/*
      - packages/frontend/.next/cache/**/*
