version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - node --version
    build:
      commands:
        - cd packages/frontend && npm run build
  artifacts:
    baseDirectory: packages/frontend
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - packages/frontend/node_modules/**/*
      - packages/frontend/.next/cache/**/*
build:
  environment:
    variables:
      NODE_VERSION: '20'
